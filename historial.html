<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos — SHOWCARS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .historial-page { min-height: 100vh; padding-top: 70px; }

        .historial-header {
            padding: 60px 80px 40px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .historial-header h1 {
            font-family: var(--font-display);
            font-size: clamp(48px, 7vw, 90px);
            line-height: 0.9;
        }

        .historial-header h1 span { color: var(--rojo); }

        .historial-user {
            text-align: right;
        }

        .historial-user p {
            font-family: var(--font-ui);
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(244,244,240,0.35);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .historial-user strong {
            font-family: var(--font-ui);
            font-size: 15px;
            letter-spacing: 1px;
            color: var(--blanco);
        }

        .historial-content {
            padding: 60px 80px;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            gap: 20px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.08);
            border-top-color: var(--rojo);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading p {
            font-family: var(--font-ui);
            font-size: 12px;
            letter-spacing: 3px;
            color: rgba(244,244,240,0.3);
            text-transform: uppercase;
        }

        /* Sin pedidos */
        .sin-pedidos {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            gap: 20px;
            text-align: center;
        }

        .sin-pedidos.visible { display: flex; }

        .sin-pedidos h3 {
            font-family: var(--font-display);
            font-size: 36px;
            color: rgba(244,244,240,0.25);
        }

        .sin-pedidos a {
            font-family: var(--font-ui);
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--rojo);
            text-decoration: none;
            border: 1px solid var(--rojo);
            padding: 10px 24px;
            transition: background 0.2s, color 0.2s;
        }

        .sin-pedidos a:hover { background: var(--rojo); color: var(--negro); }

        /* Pedido card */
        .pedido-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 16px;
            overflow: hidden;
            animation: fadeInItem 0.4s ease both;
            transition: border-color 0.3s;
        }

        .pedido-card:hover {
            border-color: rgba(255,255,255,0.12);
        }

        @keyframes fadeInItem {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .pedido-header {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 24px;
            align-items: center;
            padding: 24px 28px;
            cursor: pointer;
            user-select: none;
        }

        .pedido-header:hover { background: rgba(255,255,255,0.02); }

        .pedido-orden {
            font-family: var(--font-display);
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--rojo);
        }

        .pedido-fecha {
            font-family: var(--font-ui);
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(244,244,240,0.35);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .pedido-estado {
            font-family: var(--font-ui);
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 2px;
            background: rgba(0,200,80,0.1);
            border: 1px solid rgba(0,200,80,0.25);
            color: #4caf50;
        }

        .pedido-total {
            font-family: var(--font-display);
            font-size: 28px;
            text-align: right;
        }

        .pedido-toggle {
            font-size: 18px;
            color: rgba(244,244,240,0.3);
            transition: transform 0.3s;
            min-width: 20px;
            text-align: center;
        }

        .pedido-card.abierto .pedido-toggle { transform: rotate(180deg); }

        /* Detalle */
        .pedido-detalle {
            display: none;
            padding: 0 28px 24px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .pedido-card.abierto .pedido-detalle { display: block; }

        .detalle-items {
            margin: 20px 0;
        }

        .detalle-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .detalle-item:last-child { border-bottom: none; }

        .detalle-icono {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .detalle-nombre {
            flex: 1;
        }

        .detalle-nombre strong {
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 700;
            display: block;
            margin-bottom: 2px;
        }

        .detalle-nombre span {
            font-family: var(--font-ui);
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--rojo);
            text-transform: uppercase;
        }

        .detalle-qty {
            font-family: var(--font-ui);
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(244,244,240,0.35);
        }

        .detalle-precio {
            font-family: var(--font-display);
            font-size: 18px;
            min-width: 80px;
            text-align: right;
        }

        .detalle-resumen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .detalle-totales div {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-ui);
            font-size: 13px;
            letter-spacing: 1px;
            color: rgba(244,244,240,0.45);
            padding: 4px 0;
        }

        .detalle-totales div.total-final {
            color: var(--blanco);
            font-size: 15px;
            font-weight: 700;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin-top: 8px;
            padding-top: 10px;
        }

        .detalle-totales div.total-final span:last-child {
            font-family: var(--font-display);
            font-size: 22px;
            color: var(--rojo);
        }

        .detalle-envio {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 2px;
        }

        .detalle-envio p {
            font-family: var(--font-ui);
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--rojo);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .detalle-envio span {
            font-family: var(--font-ui);
            font-size: 13px;
            letter-spacing: 1px;
            color: rgba(244,244,240,0.55);
            display: block;
            line-height: 1.8;
        }

        /* Sin sesión */
        #no-sesion {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            gap: 20px;
            text-align: center;
        }

        #no-sesion.visible { display: flex; }

        #no-sesion h2 {
            font-family: var(--font-display);
            font-size: 48px;
            color: rgba(244,244,240,0.2);
        }

        #no-sesion a {
            font-family: var(--font-ui);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            background: var(--rojo);
            color: white;
            padding: 14px 32px;
            transition: background 0.2s;
        }

        @media (max-width: 768px) {
            .historial-header { padding: 40px 24px 32px; flex-direction: column; align-items: flex-start; gap: 16px; }
            .historial-content { padding: 32px 24px; }
            .pedido-header { grid-template-columns: 1fr auto; }
            .pedido-estado { display: none; }
            .detalle-resumen { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="historial-page">

    <div id="scroll-progress"></div>
    <div class="noise"></div>

    <header>
        <nav class="menu">
            <a href="index.html" class="logo">SHOW<span>CARS</span></a>
            <div class="links">
                <a href="marcas/porsche.html">Porsche</a>
                <a href="marcas/bmw.html">BMW</a>
                <a href="marcas/f1.html">F1</a>
                <a href="marcas/muscle.html">Muscle</a>
                <a href="login.html">Mi cuenta</a>
                <a href="carrito.html" class="btn-nav">Carrito <span class="carrito-nav-count"></span></a>
            </div>
        </nav>
    </header>

    <!-- Sin sesión -->
    <div id="no-sesion">
        <span style="font-size:64px;opacity:0.15">🔒</span>
        <h2>ACCESO REQUERIDO</h2>
        <p style="font-family:var(--font-ui);font-size:13px;letter-spacing:2px;color:rgba(244,244,240,0.3);margin-bottom:8px;">Inicia sesión para ver tus pedidos</p>
        <a href="login.html">Iniciar sesión</a>
    </div>

    <!-- Contenido con sesión -->
    <div id="contenido-sesion" style="display:none;">

        <div class="historial-header">
            <div>
                <p style="font-family:var(--font-ui);font-size:12px;letter-spacing:3px;color:var(--rojo);text-transform:uppercase;margin-bottom:8px;">// MI CUENTA</p>
                <h1>MIS <span>PEDIDOS</span></h1>
            </div>
            <div class="historial-user">
                <p>Conectado como</p>
                <strong id="user-email-display"></strong>
                <br>
                <a href="#" id="btn-logout-hist" style="font-family:var(--font-ui);font-size:11px;letter-spacing:2px;color:rgba(244,244,240,0.3);text-decoration:none;text-transform:uppercase;margin-top:6px;display:inline-block;transition:color 0.2s;" onmouseover="this.style.color='var(--rojo)'" onmouseout="this.style.color='rgba(244,244,240,0.3)'">Cerrar sesión →</a>
            </div>
        </div>

        <div class="historial-content">
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>Cargando pedidos...</p>
            </div>

            <div class="sin-pedidos" id="sin-pedidos">
                <span style="font-size:56px;opacity:0.15">📦</span>
                <h3>AÚN NO HAY PEDIDOS</h3>
                <p style="font-family:var(--font-ui);font-size:12px;letter-spacing:2px;color:rgba(244,244,240,0.3);margin-bottom:8px;">Explora nuestras marcas y encuentra algo que te guste</p>
                <a href="index.html#marcas">Explorar tienda</a>
            </div>

            <div id="lista-pedidos"></div>
        </div>

    </div>

    <script src="carrito.js"></script>
    <script type="module">
        import { escucharSesion, cerrarSesion, obtenerHistorial } from "./firebase.js";

        function formatFecha(ts) {
            if (!ts) return "—";
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleDateString("es-MX", { day:"2-digit", month:"long", year:"numeric" });
        }

        function togglePedido(card) {
            card.classList.toggle("abierto");
        }

        function renderPedidos(pedidos) {
            const lista = document.getElementById("lista-pedidos");
            const sinPed = document.getElementById("sin-pedidos");
            document.getElementById("loading").style.display = "none";

            if (pedidos.length === 0) {
                sinPed.classList.add("visible");
                return;
            }

            lista.innerHTML = "";

            pedidos.forEach((p, i) => {
                const card = document.createElement("div");
                card.className = "pedido-card";
                card.style.animationDelay = (i * 0.08) + "s";

                const itemsHtml = (p.items || []).map(item => `
                    <div class="detalle-item">
                        <div class="detalle-icono">${item.icono || "🛍️"}</div>
                        <div class="detalle-nombre">
                            <strong>${item.nombre}</strong>
                            <span>${item.marca}</span>
                            ${item.tipo === "evento" ? `<span style="color:rgba(244,244,240,0.3);font-size:9px;">📅 ${item.fecha || ""} · 📍 ${item.lugar || ""}</span>` : ""}
                        </div>
                        <div class="detalle-qty">× ${item.qty}</div>
                        <div class="detalle-precio">$${(item.precio * item.qty).toLocaleString()}</div>
                    </div>
                `).join("");

                const envio = p.datosEnvio || {};
                const metodo = p.metodoPago === "tarjeta" ? "💳 Tarjeta" : p.metodoPago === "paypal" ? "🅿️ PayPal" : "🏪 OXXO";

                card.innerHTML = `
                    <div class="pedido-header" onclick="this.parentElement.classList.toggle('abierto')">
                        <div>
                            <div class="pedido-orden">${p.ordenId || p.id.substring(0,8).toUpperCase()}</div>
                            <div class="pedido-fecha">${formatFecha(p.fechaCreado)}</div>
                        </div>
                        <div class="pedido-estado">✓ ${p.estado || "confirmado"}</div>
                        <div class="pedido-total">$${(p.total || 0).toLocaleString()}</div>
                        <div class="pedido-toggle">▾</div>
                    </div>
                    <div class="pedido-detalle">
                        <div class="detalle-items">${itemsHtml}</div>
                        <div class="detalle-resumen">
                            <div class="detalle-totales">
                                <div><span>Subtotal</span><span>$${(p.subtotal||0).toLocaleString()}</span></div>
                                <div><span>Envío</span><span>$${(p.envio||0).toLocaleString()}</span></div>
                                <div><span>IVA (16%)</span><span>$${(p.iva||0).toLocaleString()}</span></div>
                                <div class="total-final"><span>Total</span><span>$${(p.total||0).toLocaleString()}</span></div>
                            </div>
                            <div class="detalle-envio">
                                <p>// DATOS DE ENVÍO</p>
                                <span>${envio.nombre || ""} ${envio.apellido || ""}</span>
                                <span>${envio.direccion || ""}</span>
                                <span>${envio.ciudad || ""}, ${envio.estado || ""} ${envio.cp || ""}</span>
                                <span style="margin-top:8px;display:block;color:rgba(244,244,240,0.3);">${metodo}</span>
                            </div>
                        </div>
                    </div>
                `;

                lista.appendChild(card);
            });
        }

        // --- ESTADO DE SESIÓN ---
        escucharSesion(async (user) => {
            if (!user) {
                document.getElementById("no-sesion").classList.add("visible");
                document.getElementById("contenido-sesion").style.display = "none";
                return;
            }

            document.getElementById("no-sesion").classList.remove("visible");
            document.getElementById("contenido-sesion").style.display = "block";
            document.getElementById("user-email-display").textContent = user.email;

            try {
                const pedidos = await obtenerHistorial(user.uid);
                renderPedidos(pedidos);
            } catch (err) {
                console.error(err);
                document.getElementById("loading").style.display = "none";
                document.getElementById("sin-pedidos").classList.add("visible");
            }
        });

        // --- LOGOUT ---
        document.getElementById("btn-logout-hist").addEventListener("click", async (e) => {
            e.preventDefault();
            await cerrarSesion();
            window.location.href = "login.html";
        });

        // Scroll progress
        window.addEventListener("scroll", () => {
            const bar = document.getElementById("scroll-progress");
            if (bar) bar.style.width = (window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100) + "%";
        });
    </script>
</body>
</html>
